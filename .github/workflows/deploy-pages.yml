name: Déploiement GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Configurer Pages
      uses: actions/configure-pages@v5

      - name: Préparer l’artefact statique
      run: |
        mkdir -p dist
        cp index.html styles.css app.js config.js dist/

      - name: Uploader l’artefact
      uses: actions/upload-pages-artifact@v3
      with:
        path: dist

      - name: Déployer sur GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
